<!DOCTYPE html>
<html lang="en" data-beasties-container>
  <head>
    <meta charset="utf-8">
    <title>Budget Planner</title>
    <base href="/budget-planner/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script>
      // Add type="module" to dynamically generated scripts with .mjs extension
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          document.querySelectorAll('script[src$=".js"]').forEach(function(script) {
            if (script.src.includes('styles.js') || script.src.includes('remoteEntry.mjs')) {
              script.type = 'module';
            }
          });
        }, 10);
      });
    </script>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
      }
      app-root {
        display: block;
        width: 100%;
      }
    </style>
  <link rel="stylesheet" href="styles.ef46db3751d8e999.css"></head>
  <body>
    <budget-planner-root></budget-planner-root>
  <script src="polyfills.710f60346c05428d.js" type="module"></script><script src="main.b020ba0555d76652.js" type="module"></script></body>
</html>
